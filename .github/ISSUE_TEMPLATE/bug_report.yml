name: Bug report
description: Report a reproducible issue in ClawLite.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Description
      description: What happened and what did you expect?
      placeholder: Explain the issue objectively.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the minimum steps to reproduce.
      placeholder: |
        1. Run...
        2. Execute...
        3. Observe the error...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs/stacktrace
      description: Paste relevant excerpts (without secrets).
      render: shell
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: System, Python, mode (Linux/Termux), ClawLite version.
      placeholder: Ubuntu 24.04 / Python 3.11 / ClawLite 0.4.1
    validations:
      required: true
