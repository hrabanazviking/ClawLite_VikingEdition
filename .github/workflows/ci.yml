name: CI - Tests and Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest pytest-asyncio pytest-anyio anyio httpx "fastapi[all]" uvicorn

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting and linting
        # Fail on critical errors (E9xx = runtime errors, F = pyflakes)
        run: ruff check clawlite/ --select E9,F --ignore F401,F811

  smoke:
    name: Smoke test (doctor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ClawLite
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Smoke - import core modules
        run: |
          python -c "from clawlite.gateway import server; print('gateway ok')"
          python -c "from clawlite.core.engine import AgentEngine; print('engine ok')"
          python -c "from clawlite.scheduler.cron import CronService; print('scheduler ok')"
          python -c "from clawlite.tools.registry import ToolRegistry; print('tools ok')"

      - name: Smoke - CLI entrypoint and YAML config
        run: |
          clawlite --help >/dev/null
          python - <<'PY'
          import pathlib
          import subprocess
          import tempfile

          tmpdir = pathlib.Path(tempfile.mkdtemp(prefix="clawlite-smoke-"))
          config_path = tmpdir / "config.yaml"
          config_path.write_text(
              "\n".join(
                  [
                      f"workspace_path: {tmpdir / 'workspace'}",
                      f"state_path: {tmpdir / 'state'}",
                      "",
                  ]
              ),
              encoding="utf-8",
          )
          subprocess.run(["clawlite", "--config", str(config_path), "status"], check=True)
          PY

  autonomy-contract:
    name: Autonomy control contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ClawLite
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest pytest-asyncio pytest-anyio anyio httpx "fastapi[all]" uvicorn

      - name: Run autonomy contract tests
        run: python -m pytest -q tests/runtime/test_autonomy_actions.py tests/gateway/test_server.py
