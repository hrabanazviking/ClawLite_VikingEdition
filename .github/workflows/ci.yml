name: CI - Tests and Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if python - <<'PY'
          import pathlib
          try:
              import tomllib
          except Exception:
              import tomli as tomllib  # type: ignore
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))
          optional = (data.get('project', {}) or {}).get('optional-dependencies', {}) or {}
          raise SystemExit(0 if 'dev' in optional else 1)
          PY
          then
            pip install -e ".[dev]"
          else
            pip install -e .
          fi
          pip install pytest pytest-anyio httpx "fastapi[all]" uvicorn questionary rich

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting and linting
        # Fail on critical errors (E9xx = runtime errors, F = pyflakes)
        run: ruff check clawlite/ --select E9,F --ignore F401,F811

  smoke:
    name: Smoke test (doctor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ClawLite
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install httpx fastapi uvicorn rich questionary

      - name: Smoke - import core modules
        run: |
          python -c "from clawlite.gateway import server; print('gateway ok')"
          python -c "from clawlite.core.engine import AgentEngine; print('engine ok')"
          python -c "from clawlite.scheduler.cron import CronService; print('scheduler ok')"
          python -c "from clawlite.tools.registry import ToolRegistry; print('tools ok')"

  autonomy-contract:
    name: Autonomy control contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ClawLite
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-anyio httpx "fastapi[all]" uvicorn questionary rich

      - name: Run autonomy contract tests
        run: python -m pytest -q tests/runtime/test_autonomy_actions.py tests/gateway/test_server.py
